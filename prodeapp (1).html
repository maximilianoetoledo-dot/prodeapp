<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProdeApp</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1a0e;
    --bg2: #152015;
    --bg3: #1c2e1c;
    --border: #2a3d2a;
    --gold: #c8a840;
    --gold-dim: #8a7030;
    --text: #dde8dd;
    --text-dim: #7a9a7a;
    --green-btn: #1e3020;
    --red: #c87070;
    --success: #6ac88a;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* AUTH */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }

  .auth-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .auth-sub {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 40px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .auth-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
    width: 100%;
  }

  .auth-tabs {
    display: flex;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .auth-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }

  .auth-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Barlow', sans-serif;
    outline: none;
  }

  .field input:focus {
    border-color: var(--gold-dim);
  }

  .btn-primary {
    width: 100%;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  .btn-primary:hover { background: #d4b445; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .auth-msg {
    margin-top: 12px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
  }

  .auth-msg.error { color: var(--red); }
  .auth-msg.success { color: var(--success); }

  /* APP */
  #app-screen { display: none; }

  .header {
    background: var(--bg2);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .credits-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    color: var(--gold);
    font-weight: 600;
  }

  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
  }

  .tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .tab {
    flex: 1;
    min-width: 70px;
    padding: 11px 6px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'Barlow', sans-serif;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
  }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .content {
    padding: 16px;
    padding-bottom: 40px;
  }

  .section-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 0 0 12px;
  }

  .match-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .match-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .league-tag {
    font-size: 11px;
    color: var(--text-dim);
  }

  .meta-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bettors-tag {
    font-size: 11px;
    color: var(--gold);
    background: var(--bg3);
    border-radius: 10px;
    padding: 2px 8px;
  }

  .time-tag {
    font-size: 11px;
    color: var(--text-dim);
  }

  .teams-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .team-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    flex: 1;
  }

  .vs-sep {
    font-size: 11px;
    color: var(--text-dim);
    padding: 0 8px;
  }

  .pick-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .pick-btn {
    padding: 9px 4px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--green-btn);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    font-family: 'Barlow', sans-serif;
    transition: all 0.15s;
    line-height: 1.3;
  }

  .pick-btn:hover:not(:disabled) {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .pick-btn.selected {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
    font-weight: 600;
  }

  .pick-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .confirm-row {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }

  .confirm-row.show { display: flex; }

  .cost-note {
    font-size: 12px;
    color: var(--text-dim);
  }

  .confirm-btn {
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
  }

  .bet-placed {
    display: none;
    margin-top: 10px;
    font-size: 13px;
    color: var(--success);
    text-align: center;
  }

  .section-gap { margin-top: 24px; }

  /* RANKING */
  .ranking-row {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .rank-pos {
    width: 28px;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
  }

  .rank-pos.top { color: var(--gold); }

  .rank-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    margin-right: 12px;
    text-transform: uppercase;
  }

  .rank-name { flex: 1; font-size: 14px; }
  .rank-credits { font-size: 14px; color: var(--gold); font-weight: 600; }

  /* BILLETERA */
  .wallet-hero {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    text-align: center;
  }

  .wallet-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .wallet-amount { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 700; color: var(--gold); }
  .wallet-eq { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

  .tx-row {
    display: flex;
    justify-content: space-between;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .tx-desc { color: var(--text); }
  .tx-amt { font-weight: 600; }
  .tx-amt.pos { color: var(--success); }
  .tx-amt.neg { color: var(--red); }

  .btn-withdraw {
    width: 100%;
    margin-top: 20px;
    background: none;
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    padding: 14px;
    color: var(--gold);
    font-size: 14px;
    font-weight: 600;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
  }

  /* MIS APUESTAS */
  .bet-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .bet-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .bet-match { font-size: 14px; font-weight: 500; }
  .bet-pick { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

  .status-badge {
    font-size: 11px;
    border-radius: 10px;
    padding: 3px 10px;
    white-space: nowrap;
  }

  .s-pending { background: #1a2a10; color: #8aaa5a; }
  .s-won { background: #0a2a18; color: var(--success); }
  .s-lost { background: #2a0a0a; color: var(--red); }

  .loading { text-align: center; color: var(--text-dim); padding: 40px 0; font-size: 14px; }
  .empty { text-align: center; color: var(--text-dim); padding: 40px 0; font-size: 14px; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">PRODE</div>
  <div class="auth-sub">Mundial 2026 & Ligas</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Ingresar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Registrarse</button>
    </div>
    <div id="login-form">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="tu@email.com"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres"></div>
      <button class="btn-primary" onclick="doRegister()">Crear cuenta</button>
    </div>
    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="header">
    <div class="header-logo">PRODE</div>
    <div class="header-right">
      <div class="credits-pill">★ <span id="credits-display">900</span></div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('partidos')">Partidos</button>
    <button class="tab" onclick="showTab('wc26')">WC26</button>
    <button class="tab" onclick="showTab('ranking')">Ranking</button>
    <button class="tab" onclick="showTab('misapuestas')">Mis apuestas</button>
    <button class="tab" onclick="showTab('billetera')">Billetera</button>
  </div>

  <div class="content">
    <div id="tab-partidos" class="tab-content active">
      <p class="section-label">Hoy</p>
      <div id="matches-hoy"><div class="loading">Cargando partidos...</div></div>
      <div class="section-gap">
        <p class="section-label">Mañana</p>
        <div id="matches-manana"></div>
      </div>
    </div>

    <div id="tab-wc26" class="tab-content">
      <p class="section-label">Fase de grupos — Mundial 2026</p>
      <div id="matches-wc"><div class="loading">Cargando partidos...</div></div>
    </div>

    <div id="tab-ranking" class="tab-content">
      <p class="section-label">Tabla de posiciones</p>
      <div id="ranking-list"><div class="loading">Cargando ranking...</div></div>
    </div>

    <div id="tab-misapuestas" class="tab-content">
      <p class="section-label">Historial</p>
      <div id="my-bets"><div class="loading">Cargando apuestas...</div></div>
    </div>

    <div id="tab-billetera" class="tab-content">
      <div class="wallet-hero">
        <div class="wallet-label">Saldo disponible</div>
        <div class="wallet-amount">★ <span id="wallet-amount">900</span></div>
        <div class="wallet-eq">= créditos acumulados</div>
      </div>
      <p class="section-label">Movimientos</p>
      <div id="tx-list"></div>
      <button class="btn-withdraw" onclick="requestWithdraw()">Solicitar retiro</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://njnlbwiuawshfdncniav.supabase.co';
const SUPABASE_KEY = 'sb_publishable_K3XutVZ7enzzutUVlgrniw_3hQo5GIV';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let userProfile = null;
let userBets = [];

// AUTH
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-msg').textContent = '';
}

function setMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg ' + type;
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { setMsg('Completá todos los campos.', 'error'); return; }
  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) { setMsg('Email o contraseña incorrectos.', 'error'); return; }
  await loadApp(data.user);
}

async function doRegister() {
  const email = document.getElementById('reg-email').value;
  const pass = document.getElementById('reg-pass').value;
  if (!email || !pass) { setMsg('Completá todos los campos.', 'error'); return; }
  if (pass.length < 6) { setMsg('La contraseña debe tener al menos 6 caracteres.', 'error'); return; }
  const { data, error } = await db.auth.signUp({ email, password: pass });
  if (error) { setMsg('Error: ' + error.message, 'error'); return; }
  setMsg('¡Cuenta creada! Revisá tu email para confirmar.', 'success');
}

async function doLogout() {
  await db.auth.signOut();
  currentUser = null;
  userProfile = null;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

async function loadApp(user) {
  currentUser = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  await loadProfile();
  await loadMatches();
  await loadMyBets();
  await loadRanking();
}

async function loadProfile() {
  const { data } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
  if (data) {
    userProfile = data;
    document.getElementById('credits-display').textContent = data.credits;
    document.getElementById('wallet-amount').textContent = data.credits;
  }
}

// MATCHES
function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
}

function isToday(iso) {
  const d = new Date(iso);
  const now = new Date();
  return d.toDateString() === now.toDateString();
}

function isTomorrow(iso) {
  const d = new Date(iso);
  const tom = new Date();
  tom.setDate(tom.getDate() + 1);
  return d.toDateString() === tom.toDateString();
}

function isWC(league) {
  return league.toLowerCase().includes('mundial');
}

async function loadMatches() {
  const { data: matches } = await db.from('matches').select('*').order('match_time');
  const { data: betCounts } = await db.from('bets').select('match_id');

  const counts = {};
  if (betCounts) betCounts.forEach(b => { counts[b.match_id] = (counts[b.match_id] || 0) + 1; });

  const hoyEl = document.getElementById('matches-hoy');
  const mananaEl = document.getElementById('matches-manana');
  const wcEl = document.getElementById('matches-wc');

  hoyEl.innerHTML = '';
  mananaEl.innerHTML = '';
  wcEl.innerHTML = '';

  if (!matches) return;

  matches.forEach(m => {
    const bettors = counts[m.id] || 0;
    const myBet = userBets.find(b => b.match_id === m.id);
    const card = buildMatchCard(m, bettors, myBet);

    if (isWC(m.league)) {
      wcEl.appendChild(card);
    } else if (isToday(m.match_time)) {
      hoyEl.appendChild(card);
    } else if (isTomorrow(m.match_time)) {
      mananaEl.appendChild(card);
    }
  });

  if (!hoyEl.innerHTML) hoyEl.innerHTML = '<div class="empty">No hay partidos hoy.</div>';
  if (!mananaEl.innerHTML) mananaEl.innerHTML = '<div class="empty">No hay partidos mañana.</div>';
  if (!wcEl.innerHTML) wcEl.innerHTML = '<div class="empty">No hay partidos cargados.</div>';
}

function buildMatchCard(m, bettors, myBet) {
  const div = document.createElement('div');
  div.className = 'match-card';
  div.id = 'mc-' + m.id;

  const labels = { home: m.home_team + ' gana', draw: 'Empate', away: m.away_team + ' gana' };
  const alreadyBet = !!myBet;
  const finished = m.status === 'finished';

  div.innerHTML = `
    <div class="match-meta">
      <span class="league-tag">${m.league}</span>
      <div class="meta-right">
        <span class="bettors-tag">${bettors} apostador${bettors !== 1 ? 'es' : ''}</span>
        <span class="time-tag">${formatTime(m.match_time)}</span>
      </div>
    </div>
    <div class="teams-row">
      <span class="team-name">${m.home_team}</span>
      <span class="vs-sep">vs</span>
      <span class="team-name">${m.away_team}</span>
    </div>
    ${alreadyBet ? `
      <div style="text-align:center;font-size:13px;color:var(--success);padding:4px 0;">
        ✓ Apostaste: ${labels[myBet.pick]}
      </div>
    ` : finished ? `
      <div style="text-align:center;font-size:13px;color:var(--text-dim);padding:4px 0;">Partido finalizado</div>
    ` : `
      <div class="pick-buttons">
        <button class="pick-btn" onclick="selectPick(${m.id}, 'home', this)">${m.home_team} gana</button>
        <button class="pick-btn" onclick="selectPick(${m.id}, 'draw', this)">Empate</button>
        <button class="pick-btn" onclick="selectPick(${m.id}, 'away', this)">${m.away_team} gana</button>
      </div>
      <div class="confirm-row" id="cr-${m.id}">
        <span class="cost-note">Costo: 300 créditos</span>
        <button class="confirm-btn" onclick="placeBet(${m.id}, '${m.home_team}', '${m.away_team}')">Confirmar</button>
      </div>
    `}
  `;
  return div;
}

let picks = {};

function selectPick(matchId, opt, btn) {
  const card = document.getElementById('mc-' + matchId);
  card.querySelectorAll('.pick-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  picks[matchId] = opt;
  document.getElementById('cr-' + matchId).classList.add('show');
}

async function placeBet(matchId, home, away) {
  if (!picks[matchId]) return;
  if (userProfile.credits < 300) { alert('No tenés suficientes créditos.'); return; }

  const { error } = await db.from('bets').insert({
    user_id: currentUser.id,
    match_id: matchId,
    pick: picks[matchId],
    credits_wagered: 300
  });

  if (error) { alert('Error al registrar apuesta.'); return; }

  // Descontar créditos
  const newCredits = userProfile.credits - 300;
  await db.from('profiles').update({ credits: newCredits }).eq('id', currentUser.id);
  userProfile.credits = newCredits;
  document.getElementById('credits-display').textContent = newCredits;
  document.getElementById('wallet-amount').textContent = newCredits;

  // Actualizar UI del card
  const labels = { home: home + ' gana', draw: 'Empate', away: away + ' gana' };
  const card = document.getElementById('mc-' + matchId);
  const btnsArea = card.querySelector('.pick-buttons');
  const confirmRow = document.getElementById('cr-' + matchId);
  if (btnsArea) btnsArea.remove();
  if (confirmRow) confirmRow.remove();
  card.insertAdjacentHTML('beforeend', `
    <div style="text-align:center;font-size:13px;color:var(--success);padding:4px 0;">
      ✓ Apostaste: ${labels[picks[matchId]]}
    </div>
  `);

  // Actualizar contador de apostadores
  const tag = card.querySelector('.bettors-tag');
  const current = parseInt(tag.textContent);
  tag.textContent = (current + 1) + ' apostadores';

  await loadMyBets();
}

// MIS APUESTAS
async function loadMyBets() {
  const { data } = await db.from('bets')
    .select('*, matches(home_team, away_team, league)')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  userBets = data || [];

  const el = document.getElementById('my-bets');
  if (!userBets.length) {
    el.innerHTML = '<div class="empty">Todavía no hiciste apuestas.</div>';
    return;
  }

  const labels = { home: 'gana local', draw: 'empate', away: 'gana visitante' };
  const statusMap = { pending: ['s-pending', 'En espera'], won: ['s-won', 'Ganada'], lost: ['s-lost', 'Perdida'] };

  el.innerHTML = userBets.map(b => {
    const [cls, lbl] = statusMap[b.status] || statusMap.pending;
    return `
      <div class="bet-card">
        <div class="bet-card-top">
          <div>
            <div class="bet-match">${b.matches.home_team} vs ${b.matches.away_team}</div>
            <div class="bet-pick">Tu pronóstico: ${labels[b.pick] || b.pick} · 300 créditos</div>
          </div>
          <span class="status-badge ${cls}">${lbl}</span>
        </div>
      </div>
    `;
  }).join('');
}

// RANKING
async function loadRanking() {
  const { data } = await db.from('profiles').select('username, credits').order('credits', { ascending: false }).limit(20);
  const el = document.getElementById('ranking-list');
  if (!data || !data.length) { el.innerHTML = '<div class="empty">Sin datos aún.</div>'; return; }

  el.innerHTML = data.map((p, i) => `
    <div class="ranking-row">
      <span class="rank-pos ${i < 3 ? 'top' : ''}">${i + 1}</span>
      <div class="rank-avatar">${p.username.slice(0, 2)}</div>
      <span class="rank-name">${p.username}</span>
      <span class="rank-credits">★ ${p.credits}</span>
    </div>
  `).join('');
}

// TABS
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

function requestWithdraw() {
  alert('Solicitud de retiro registrada. El admin se contactará a tu email.');
}

// INIT
db.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    await loadApp(session.user);
  }
});
</script>
